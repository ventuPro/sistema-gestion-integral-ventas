<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  
  <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden">
    
    <div class="bg-blue-600 p-6 text-center">
      <h1 class="text-3xl font-bold text-white">SGIV</h1>
      <p class="text-blue-200 mt-1">Sistema de Gestión de Inventario y Ventas</p>
    </div>

    <div class="p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar Sesión</h2>

      <form>
        <div *ngIf="mensajeError" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
          <span class="block sm:inline">{{ mensajeError }}</span>
        </div>

        <div class="mb-5">
          <label for="correo" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
          <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="correo"
          (keyup.enter)="iniciarSesion()"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
          placeholder="admin@sgiv.com"
          >
        </div>

        <div class="mb-6">
          <label for="contrasena" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            [(ngModel)]="contrasena"
            (keyup.enter)="iniciarSesion()"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
            placeholder="••••••••"
          >
        </div>

        <button 
          type="button" 
          (click)="iniciarSesion()"
          [disabled]="cargando"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-300 disabled:opacity-50 flex justify-center">
          
          <span *ngIf="!cargando">Ingresar al Sistema</span>
          <span *ngIf="cargando">Verificando...</span>

        </button>
      </form>
      
    </div>
  </div>
</div>
