<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
  
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Inventario de Productos</h2>
    <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg flex items-center transition-colors">
      <span class="mr-2">+</span> Nuevo Producto
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-200">
          <th class="px-6 py-4 font-medium">Producto</th>
          <th class="px-6 py-4 font-medium">Categoría</th>
          <th class="px-6 py-4 font-medium">Precio (Bs.)</th>
          <th class="px-6 py-4 font-medium">Stock</th>
          <th class="px-6 py-4 font-medium">Estado</th>
          <th class="px-6 py-4 font-medium text-center">Acciones</th>
        </tr>
      </thead>
      
      <tbody class="text-gray-700">
        
        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 font-medium text-gray-900">Torta Tres Leches</td>
          <td class="px-6 py-4 text-gray-500">Postres</td>
          <td class="px-6 py-4 font-semibold text-gray-800">120.00</td>
          <td class="px-6 py-4">15</td>
          <td class="px-6 py-4">
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Disponible</span>
          </td>
          <td class="px-6 py-4 text-center">
            <button class="text-blue-500 hover:text-blue-700 font-medium mr-3">Editar</button>
            <button class="text-red-500 hover:text-red-700 font-medium">Borrar</button>
          </td>
        </tr>

        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 font-medium text-gray-900">Galletas de Chispas</td>
          <td class="px-6 py-4 text-gray-500">Horneados</td>
          <td class="px-6 py-4 font-semibold text-gray-800">15.00</td>
          <td class="px-6 py-4 text-red-500 font-bold">3</td>
          <td class="px-6 py-4">
            <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Stock Bajo</span>
          </td>
          <td class="px-6 py-4 text-center">
            <button class="text-blue-500 hover:text-blue-700 font-medium mr-3">Editar</button>
            <button class="text-red-500 hover:text-red-700 font-medium">Borrar</button>
          </td>
        </tr>

      </tbody>
    </table>
  </div>
</div>
